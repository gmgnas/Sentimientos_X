<!DOCTYPE html>
<html lang="es">
<head>
    <title>Dashboard Sentimientos X</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; background: #f4f7f9; color: #333; }
        
        /* Encabezado con degradado y sombra */
        .header { 
            background: linear-gradient(135deg, #1a237e 0%, #0d47a1 100%); 
            color: white; 
            padding: 30px 20px; 
            text-align: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        
        .header h1 { margin: 0; font-size: 2em; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Estilo para el Tema Dinámico (Blanco para que contraste con el azul) */
        #tema-dinamico { 
            background: rgba(255, 255, 255, 0.1); 
            display: inline-block; 
            padding: 5px 20px; 
            border-radius: 20px; 
            margin: 15px 0; 
            font-weight: 400;
            color: #ffca28; /* Dorado suave para resaltar el tema */
        }

        .materia { font-size: 1.1em; margin-bottom: 5px; opacity: 0.9; }
        .alumnos { font-size: 0.9em; opacity: 0.8; }

        .container { padding: 30px; max-width: 1200px; margin: auto; }
        
        /* Grilla de Tarjetas */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        
        .card { padding: 25px; border-radius: 15px; color: white; text-align: center; transition: transform 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card span { display: block; font-size: 2.8em; font-weight: bold; margin-top: 10px; }
        
        .c-total { background: #2c3e50; }
        .c-pos { background: #1a237e; } /* Azul Institucional */
        .c-neu { background: #757575; } /* Gris */
        .c-neg { background: #b71c1c; } /* Rojo Oscuro */

        .chart-box { 
            background: white; 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 1px solid #e0e0e0; 
        }
        
        .chart-box h3 { margin-top: 0; color: #1a237e; border-bottom: 2px solid #f4f7f9; padding-bottom: 10px; }
        iframe { width: 100%; height: 500px; border: none; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Análisis de Sentimientos de X</h1>
        
        <h2 id="tema-dinamico">Cargando tema...</h2>
        
        <div class="materia">Materia: Arquitectura de Soluciones</div>
        <div class="alumnos">Alumnos: Facundo Zubeldia - Gonzalo Martín González</div>
    </div>

    <div class="container">
        <div class="grid">
            <div class="card c-total">POST TOTALES <span id="t-tot">0</span></div>
            <div class="card c-pos">POSITIVOS <span id="t-pos">0</span></div>
            <div class="card c-neu">NEUTROS <span id="t-neu">0</span></div>
            <div class="card c-neg">NEGATIVOS <span id="t-neg">0</span></div>
        </div>

        <div class="chart-box">
            <h3>📈 Evolución Temporal de Sentimientos</h3>
            <iframe src="lineas.html"></iframe> </div>
    </div>

    <script src="data.js"></script>
    <script>
        // Esperamos a que el DOM esté listo
        document.addEventListener("DOMContentLoaded", function() {
            // Actualizar métricas
            document.getElementById('t-tot').innerText = typeof total !== 'undefined' ? total : 0;
            document.getElementById('t-pos').innerText = typeof pos !== 'undefined' ? pos : 0;
            document.getElementById('t-neu').innerText = typeof neu !== 'undefined' ? neu : 0;
            document.getElementById('t-neg').innerText = typeof neg !== 'undefined' ? neg : 0;
            
            // Actualizar Tema en el encabezado
            if (typeof temaActual !== 'undefined') {
                document.getElementById('tema-dinamico').innerText = "Tema: " + temaActual;
            } 
        });
    </script>
</body>
</html>
