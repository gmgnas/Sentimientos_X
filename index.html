<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sentimientos X - Artemisa</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; text-align: center; }
        .header { background-color: #1a1a1a; padding: 30px; border-radius: 15px; border-bottom: 4px solid #1a237e; margin-bottom: 20px; }
        h1 { margin: 0; color: #ffffff; }
        #tema-dinamico { color: #ffca28; margin: 10px 0; font-size: 1.8em; }
        .materia { font-style: italic; color: #bbb; }
        .alumnos { margin-top: 10px; font-weight: bold; color: #9e9e9e; }
        
        .grid-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 10px; border-top: 5px solid; }
        .pos { border-color: #1a237e; }
        .neu { border-color: #9e9e9e; }
        .neg { border-color: #8b0000; }
        .stat-val { font-size: 2.5em; display: block; margin-top: 10px; }
        
        .grafico-container { background: #1e1e1e; margin-top: 30px; padding: 20px; border-radius: 15px; }
        iframe { width: 100%; border: none; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Análisis de Sentimientos de X</h1>
        
        <h2 id="tema-dinamico">Cargando tema...</h2>
        
        <div class="materia">Materia: Arquitectura de Soluciones</div>
        <div class="alumnos">Alumnos: Facundo Zubeldia - Gonzalo Martín González</div>
    </div>

    <div class="grid-stats">
        <div class="card pos">Positivos <span id="val-pos" class="stat-val">0</span></div>
        <div class="card neu">Neutrales <span id="val-neu" class="stat-val">0</span></div>
        <div class="card neg">Negativos <span id="val-neg" class="stat-val">0</span></div>
        <div class="card" style="border-color: #ffffff;">Total <span id="val-total" class="stat-val">0</span></div>
    </div>

    <div class="grafico-container">
        <iframe src="docs/lineas.html?v=1.1" style="height:450px;"></iframe>
    </div>

    <script src="docs/data.js?v=1.1"></script>
    
    <script>
        // Función para actualizar la UI con los datos de data.js
        window.onload = function() {
            if (typeof temaActual !== 'undefined') {
                document.getElementById('tema-dinamico').innerText = "Tema: " + temaActual;
                document.getElementById('val-pos').innerText = pos;
                document.getElementById('val-neu').innerText = neu;
                document.getElementById('val-neg').innerText = neg;
                document.getElementById('val-total').innerText = total;
            }
        };
    </script>
</body>
</html>
