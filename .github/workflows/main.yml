name: Actualizar Dashboard Semanal

on:
  schedule:
    - cron: '0 0 * * 1' # Se ejecuta todos los lunes a las 00:00
  workflow_dispatch: # Permite ejecutarlo manualmente desde la pestaña Actions

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Permiso para que el bot pueda subir el nuevo data.js y la DB
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # Instalamos nltk por separado si lo usás para sentimientos
          pip install nltk 

      - name: Ejecutar Scripts (Ingesta y Visualización)
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          python src/main.py
          python src/visualizacion.py

      - name: Subir cambios al repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Agregamos la base de datos y los archivos generados en docs
          git add data/sentimientos.db docs/data.js docs/lineas.html
          
          git commit -m "Auto: Actualización de datos (Artemisa) y dashboard" || echo "No hay cambios para subir"
          git push