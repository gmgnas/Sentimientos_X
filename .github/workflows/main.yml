name: Actualizar Dashboard Semanal

on:
  schedule:
    - cron: '0 0 * * 1' # Todos los lunes a las 00:00
  workflow_dispatch: # Ejecución manual

# Forzamos el uso de Node 24 para evitar advertencias de depreciación
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas plotly pyyaml tweepy nltk

      - name: Ejecutar Scripts (Ingesta y Visualización)
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          python src/main.py
          python src/visualizacion.py

      - name: Subir cambios al repositorio
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Agregamos la base de datos y TODOS los archivos de visualización (incluida la torta)
          git add data/sentimientos.db docs/data.js docs/lineas.html docs/torta.html
          
          git commit -m "Auto: Actualización de datos y gráficos (Node 24)" || echo "No hay cambios para subir"
          git push